<!DOCTYPE html> <!-- comando para dizer que vai ser usado o HTML5-->
<html lang="pt-br"> <!-- selecioanar a lingua que vai ser usada no site -->
    <head> <!-- o head é a parte das configurações do site -->
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body> <!-- enquanto o body vai ser a parte do conteudo do site como imagem, textos e etc... -->
        <h1>Olá, Mundo!</h1>
        <hr>
        <p>Primeiro documento HTML!</p>
    </body>
</html>
